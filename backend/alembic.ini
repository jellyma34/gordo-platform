# Alembic config для ingestion-модуля.
#
# ВАЖНО: ingestion использует отдельную таблицу версий (alembic_version_ingestion),
# чтобы не конфликтовать с миграциями основного backend/app.
#
# Запуск:
#   cd backend
#   alembic upgrade head
#   alembic revision --autogenerate -m "your message"

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL читается в env.py из settings.database_url (env-переменная), не дублируем тут.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
