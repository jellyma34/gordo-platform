# Frontend Next.js на Railway (Nixpacks). Node подхватывается автоматически по package.json.
# Сервис: Root Directory = корень репозитория, Builder = Nixpacks.

[variables]
NODE_ENV = "production"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]
# Explicitly list only real directories as caches.
# tsconfig.tsbuildinfo is a FILE (generated by incremental TypeScript builds),
# not a directory. Nixpacks would otherwise try to bind-mount it as a directory,
# causing: "mount ... not a directory" build failures.
cacheDirectories = [".next/cache", "node_modules/.cache"]

[start]
cmd = "npm run start"
